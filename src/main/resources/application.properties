spring.application.name=evbatteryswap

# =============================================
# PostgreSQL DataSource — update credentials!
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/bsm_db
spring.datasource.username=postgres
spring.datasource.password=minh28052005@@
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT Configuration
# =============================================
# Secret key (min 256-bit / 32 chars)
app.jwt.secret=change-this-to-a-very-long-secret-key-at-least-256bits!
app.jwt.expiration-ms=86400000

# =============================================
# Swagger UI / Springdoc
# =============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method


# Data Serialization Mode
spring.data.web.pageable.serialization-mode=via_dto
