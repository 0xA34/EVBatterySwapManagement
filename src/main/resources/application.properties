# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,https://domain.com,https://admin.domain.com,https://staff.domain.com

# =============================================
# Swagger UI / Springdoc
# =============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method


# Data Serialization Mode
spring.data.web.pageable.serialization-mode=via_dto

# =============================================
# SoH (State of Health) Calculation Configs
# =============================================
# % suy giảm SoH trên mỗi chu kỳ nạp (mặc định 0.04)
battery.soh.cycle-degradation-rate=0.04
# % suy giảm SoH mỗi tháng do lão hóa lịch (mặc định 0.10)
battery.soh.calendar-degradation-rate=0.10
# Trọng số của số chu kỳ nạp (mặc định 0.7)
battery.soh.cycle-weight=0.7
# Trọng số của lão hóa lịch (mặc định 0.3)
battery.soh.calendar-weight=0.3
# Ngưỡng End-Of-Life, dưới mức này pin cần thay thế (mặc định 70%)
battery.soh.eol-threshold=70.0
# Ước tính số lần nạp trung bình mỗi tháng để dự báo RUL (mặc định 15)
battery.soh.avg-cycles-per-month=15
